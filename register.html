<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register – SmartHostel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap');
        :root {
            --bg: #080e1a; --surface: #111827; --surface2: #1a2540;
            --cyan: #00d2ff; --purple: #7c3aed; --text: #e2e8f0; --muted: #64748b;
            --shadow-card: 12px 12px 30px rgba(0,0,0,0.7), -6px -6px 16px rgba(255,255,255,0.04);
            --shadow-inset: inset 4px 4px 10px rgba(0,0,0,0.6), inset -3px -3px 8px rgba(255,255,255,0.03);
            --shadow-btn: 5px 5px 14px rgba(0,0,0,0.6), -3px -3px 8px rgba(255,255,255,0.07);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif;
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            padding: 24px;
            background-image: radial-gradient(ellipse at 10% 10%, rgba(124,58,237,0.15) 0%, transparent 50%),
                              radial-gradient(ellipse at 90% 90%, rgba(0,210,255,0.1) 0%, transparent 50%);
        }
        .register-card {
            background: var(--surface); width: 100%; max-width: 520px;
            border-radius: 28px; padding: 44px 40px;
            box-shadow: var(--shadow-card);
            border-top: 1px solid rgba(255,255,255,0.1);
            border-left: 1px solid rgba(255,255,255,0.05);
        }
        .card-header { text-align: center; margin-bottom: 36px; }
        .card-header .icon {
            width: 70px; height: 70px; border-radius: 20px; margin: 0 auto 18px;
            background: linear-gradient(145deg, var(--purple), var(--cyan));
            display: flex; align-items: center; justify-content: center; font-size: 1.8rem;
            box-shadow: 8px 8px 22px rgba(0,0,0,0.5), 0 0 30px rgba(124,58,237,0.35);
            border-top: 1px solid rgba(255,255,255,0.2);
        }
        .card-header h2 { font-size: 1.7rem; font-weight: 800; }
        .card-header p { color: var(--muted); margin-top: 6px; font-size: 0.9rem; }

        .form-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        @media(max-width:480px) { .form-2col { grid-template-columns: 1fr; } .register-card { padding: 32px 20px; } }

        .field-group { margin-bottom: 18px; }
        .field-label { display: block; font-size: 0.82rem; font-weight: 700; color: var(--muted); margin-bottom: 8px; letter-spacing: 0.4px; text-transform: uppercase; }
        .input-wrap { position: relative; }
        .input-wrap i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 0.88rem; }
        .input-3d {
            width: 100%; padding: 13px 14px 13px 40px; border: none; border-radius: 13px;
            background: #0d1526; color: var(--text); font-family: inherit; font-size: 0.93rem;
            box-shadow: var(--shadow-inset); outline: none; transition: 0.25s; border: 1px solid transparent;
        }
        .input-3d:focus { box-shadow: var(--shadow-inset), 0 0 15px rgba(0,210,255,0.3); border-color: rgba(0,210,255,0.4); }
        .input-3d::placeholder { color: var(--muted); }

        /* Role Selection */
        .role-section { margin-bottom: 22px; }
        .role-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 8px; }
        .role-item {
            position: relative; cursor: pointer;
        }
        .role-item input { display: none; }
        .role-box {
            display: flex; flex-direction: column; align-items: center; gap: 6px;
            padding: 18px 12px; border-radius: 14px; border: 2px solid rgba(255,255,255,0.07);
            background: var(--surface2); transition: all 0.25s; cursor: pointer;
            box-shadow: 5px 5px 14px rgba(0,0,0,0.4), -3px -3px 8px rgba(255,255,255,0.03);
        }
        .role-item input:checked + .role-box {
            border-color: var(--cyan); background: rgba(0,210,255,0.08);
            box-shadow: 5px 5px 14px rgba(0,0,0,0.4), 0 0 18px rgba(0,210,255,0.2);
        }
        .role-box .r-icon { font-size: 1.5rem; }
        .role-box .r-label { font-size: 0.88rem; font-weight: 700; }
        .role-box .r-desc { font-size: 0.75rem; color: var(--muted); }

        .btn-register {
            width: 100%; padding: 15px; border: none; border-radius: 14px;
            background: linear-gradient(145deg, var(--cyan), var(--purple));
            color: white; font-size: 1rem; font-weight: 800; cursor: pointer; font-family: inherit;
            box-shadow: 6px 6px 18px rgba(0,0,0,0.5), 0 0 25px rgba(0,210,255,0.25);
            border-top: 1px solid rgba(255,255,255,0.2);
            transition: all 0.2s; letter-spacing: 0.5px; margin-top: 4px;
        }
        .btn-register:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn-register:active { transform: translateY(2px); box-shadow: inset 4px 4px 12px rgba(0,0,0,0.6); border-top: none; }

        .login-link { text-align: center; margin-top: 20px; font-size: 0.9rem; color: var(--muted); }
        .login-link a { color: var(--cyan); font-weight: 700; text-decoration: none; transition: 0.2s; }
        .login-link a:hover { text-shadow: 0 0 10px var(--cyan); }
    </style>
</head>
<body>
<div class="register-card">
    <div class="card-header">
        <div class="icon">✨</div>
        <h2>Create Account</h2>
        <p>Join SmartHostel and manage your stay effortlessly</p>
    </div>

    <form id="registrationForm">
        <div class="form-2col">
            <div class="field-group">
                <label class="field-label">Full Name</label>
                <div class="input-wrap">
                    <i class="fa fa-user"></i>
                    <input type="text" id="regName" class="input-3d" placeholder="Your name" required>
                </div>
            </div>
            <div class="field-group">
                <label class="field-label">Email Address</label>
                <div class="input-wrap">
                    <i class="fa fa-envelope"></i>
                    <input type="email" id="regEmail" class="input-3d" placeholder="your@email.com" required>
                </div>
            </div>
            <div class="field-group">
                <label class="field-label">Password</label>
                <div class="input-wrap">
                    <i class="fa fa-lock"></i>
                    <input type="password" id="regPass" class="input-3d" placeholder="••••••••" required>
                </div>
            </div>
            <div class="field-group">
                <label class="field-label">Confirm Password</label>
                <div class="input-wrap">
                    <i class="fa fa-lock"></i>
                    <input type="password" id="regConfirmPass" class="input-3d" placeholder="••••••••" required>
                </div>
            </div>
        </div>

        <div class="role-section">
            <div class="field-label">Account Role</div>
            <div class="role-grid">
                <label class="role-item">
                    <input type="radio" name="role" value="student" checked>
                    <div class="role-box">
                        <div class="r-icon">🎓</div>
                        <div class="r-label">Student</div>
                        <div class="r-desc">Book rooms &amp; services</div>
                    </div>
                </label>
                <label class="role-item">
                    <input type="radio" name="role" value="admin">
                    <div class="role-box">
                        <div class="r-icon">🛡️</div>
                        <div class="r-label">Admin</div>
                        <div class="r-desc">Manage hostel</div>
                    </div>
                </label>
            </div>
        </div>

        <button type="submit" class="btn-register">
            <i class="fa fa-rocket"></i> Create My Account
        </button>
    </form>

    <p class="login-link">Already have an account? <a href="login.html">Sign In →</a></p>
</div>

<script>
    document.getElementById('registrationForm').onsubmit = async function(e) {
        e.preventDefault();
        const name        = document.getElementById('regName').value;
        const email       = document.getElementById('regEmail').value;
        const password    = document.getElementById('regPass').value;
        const confirmPass = document.getElementById('regConfirmPass').value;
        const role        = document.querySelector('input[name="role"]:checked').value;

        if (password !== confirmPass) return alert('Passwords do not match!');

        const fd = new FormData();
        fd.append('action','register'); fd.append('name', name);
        fd.append('email', email); fd.append('password', password); fd.append('role', role);
        try {
            const res  = await fetch('api/auth.php', { method: 'POST', body: fd });
            const data = await res.json();
            if (data.status === 'success') {
                alert('✅ Registration successful! Please sign in.');
                window.location.href = 'login.html';
            } else { alert(data.message || 'Registration failed.'); }
        } catch { alert('Error connecting to server.'); }
    };
</script>
</body>
</html>
