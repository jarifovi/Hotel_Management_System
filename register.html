<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Account - Smart Hostel</title>
    <style>
        body {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            font-family: 'Segoe UI', sans-serif; color: white; margin: 0;
        }
        .register-container {
            background: rgba(255, 255, 255, 0.05); padding: 40px; border-radius: 20px;
            width: 400px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        
        h2 { text-align: center; margin-bottom: 30px; letter-spacing: 2px; font-weight: 800; text-transform: uppercase; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: #94a3b8; }
        
        input[type="text"], input[type="email"], input[type="password"] {
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155;
            background: rgba(30, 41, 59, 0.5); color: white; outline: none; box-sizing: border-box; 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 💡 Input Hover & Focus Effects */
        input:hover {
            border-color: #94a3b8;
        }
        input:focus { 
            border-color: #00d2ff; 
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.3);
            background: rgba(30, 41, 59, 0.8);
            transform: scale(1.02); /* Focus korle halka boro hobe */
        }
        
        .role-selection { display: flex; gap: 15px; margin: 20px 0; }
        .role-box {
            flex: 1; padding: 12px; border: 1px solid #334155; border-radius: 8px;
            display: flex; align-items: center; justify-content: center; cursor: pointer; 
            transition: all 0.3s ease; background: rgba(255, 255, 255, 0.02);
        }

        /* 💡 Role Box Hover */
        .role-box:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #00d2ff;
            transform: translateY(-3px);
        }
        
        .role-box input { margin-right: 10px; cursor: pointer; accent-color: #00d2ff; }
        
        .reg-btn {
            width: 100%; padding: 15px; border-radius: 10px; border: none;
            background: linear-gradient(90deg, #00d2ff, #7e22ce);
            color: white; font-size: 1.1rem; font-weight: bold; cursor: pointer; 
            transition: all 0.4s ease;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.3);
        }

        /* 💡 Register Button Hover Effect */
        .reg-btn:hover { 
            transform: translateY(-3px) scale(1.03); 
            box-shadow: 0 10px 25px rgba(0, 210, 255, 0.4), 0 0 20px rgba(126, 34, 206, 0.4);
            letter-spacing: 1px;
            filter: brightness(1.1);
        }
        
        .reg-btn:active {
            transform: scale(0.98);
        }

    </style>
</head>
<body>

<div class="register-container">
    <h2>CREATE ACCOUNT</h2>
    <form id="registrationForm">
        <div class="input-group">
            <label>Full Name</label>
            <input type="text" id="regName" placeholder="Enter your full name" required>
        </div>
        <div class="input-group">
            <label>Email</label>
            <input type="email" id="regEmail" placeholder="Enter your email" required>
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="regPass" placeholder="Enter password" required>
        </div>
        <div class="input-group">
            <label>Confirm Password</label>
            <input type="password" id="regConfirmPass" placeholder="Confirm password" required>
        </div>

        <label>Select Role</label>
        <div class="role-selection">
            <label class="role-box">
                <input type="radio" name="role" value="student" checked> Student
            </label>
            <label class="role-box">
                <input type="radio" name="role" value="admin"> Admin
            </label>
        </div>

        <button type="submit" class="reg-btn">Register</button>
    </form>
</div>

<script>
    document.getElementById('registrationForm').onsubmit = function(e) {
        e.preventDefault();

        const email = document.getElementById('regEmail').value;
        const password = document.getElementById('regPass').value;
        const confirmPass = document.getElementById('regConfirmPass').value;
        const role = document.querySelector('input[name="role"]:checked').value;

        if(password !== confirmPass) {
            alert("Passwords do not match!");
            return;
        }

        const user = { email, password, role };
        localStorage.setItem('user_' + email, JSON.stringify(user));

        alert('Registration Successful! Please Login.');
        window.location.href = 'login.html';
    };
</script>
</body>
</html>
