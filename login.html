<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Smart Hostel</title>
    <style>
        body {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            display: flex; justify-content: center; align-items: center; height: 100vh;
            font-family: 'Segoe UI', sans-serif; color: white; margin: 0;
        }
        .login-container {
            background: rgba(255, 255, 255, 0.05); padding: 40px; border-radius: 20px;
            width: 380px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease;
        }
        
        /* Container Hover Effect */
        .login-container:hover {
            border-color: rgba(255, 255, 255, 0.2);
        }

        h2 { text-align: center; margin-bottom: 30px; letter-spacing: 2px; font-weight: 800; text-transform: uppercase; }
        .input-group { margin-bottom: 25px; }
        label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: #94a3b8; }
        
        input {
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155;
            background: rgba(30, 41, 59, 0.5); color: white; outline: none; box-sizing: border-box; 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 💡 Input Focus & Hover Effect */
        input:hover {
            border-color: #94a3b8;
        }
        input:focus { 
            border-color: #00d2ff; 
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.3);
            background: rgba(30, 41, 59, 0.8);
            transform: translateX(5px); /* Ektu slide hobe focus e */
        }
        
        .login-btn {
            width: 100%; padding: 15px; border-radius: 10px; border: none;
            background: linear-gradient(90deg, #7e22ce, #00d2ff);
            color: white; font-size: 1.1rem; font-weight: bold; cursor: pointer; 
            transition: all 0.4s ease;
            box-shadow: 0 4px 15px rgba(126, 34, 206, 0.3);
            position: relative;
            overflow: hidden;
        }

        /* 💡 Login Button Hover Effect */
        .login-btn:hover { 
            opacity: 1; 
            transform: translateY(-3px) scale(1.02); 
            box-shadow: 0 10px 25px rgba(0, 210, 255, 0.4), 0 0 15px rgba(126, 34, 206, 0.4);
            letter-spacing: 1px;
        }
        
        /* Button Click Effect */
        .login-btn:active {
            transform: scale(0.98);
        }

        .switch { text-align: center; margin-top: 20px; font-size: 0.85rem; color: #94a3b8; }
        .switch a { 
            color: #00d2ff; text-decoration: none; font-weight: bold; 
            transition: all 0.3s ease;
            padding: 2px 5px;
        }
        
        /* 💡 Register Link Hover Effect */
        .switch a:hover { 
            color: #fff; 
            text-shadow: 0 0 8px #00d2ff;
            background: rgba(0, 210, 255, 0.1);
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="login-container">
    <h2>LOGIN</h2>
    <form id="loginForm">
        <div class="input-group">
            <label>Email</label>
            <input type="email" id="loginEmail" placeholder="Enter your email" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="loginPass" placeholder="Enter password" required>
        </div>

        <button type="submit" class="login-btn">Login</button>
        <p class="switch">Don't have an account? <a href="register.html">Register</a></p>
    </form>
</div>

<script>
    document.getElementById('loginForm').onsubmit = function(e) {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value;
        const pass = document.getElementById('loginPass').value;

        const storedUser = JSON.parse(localStorage.getItem('user_' + email));

        if (storedUser && storedUser.password === pass) {
            if (storedUser.role === 'admin') {
                window.location.href = 'admin_dashboard.html';
            } else {
                window.location.href = 'user_dashboard.html';
            }
        } else {
            alert("Invalid Email or Password! Make sure you are registered.");
        }
    };
</script>
</body>
</html>
