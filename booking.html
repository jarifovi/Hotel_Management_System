<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment – SmartHostel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap');
        :root {
            --bg: #080e1a; --surface: #111827; --surface2: #1a2540;
            --cyan: #00d2ff; --purple: #7c3aed; --text: #e2e8f0; --muted: #64748b;
            --shadow-card: 8px 8px 24px rgba(0,0,0,0.7), -4px -4px 12px rgba(255,255,255,0.04);
            --shadow-inset: inset 4px 4px 10px rgba(0,0,0,0.6), inset -3px -3px 8px rgba(255,255,255,0.03);
            --shadow-btn: 5px 5px 14px rgba(0,0,0,0.6), -3px -3px 8px rgba(255,255,255,0.07);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            padding: 24px;
            background-image: radial-gradient(ellipse at 20% 50%, rgba(124,58,237,0.12) 0%, transparent 55%),
                              radial-gradient(ellipse at 80% 20%, rgba(0,210,255,0.08) 0%, transparent 50%);
        }

        .booking-card {
            background: var(--surface); width: 100%; max-width: 500px;
            border-radius: 28px; padding: 40px 36px;
            box-shadow: var(--shadow-card);
            border-top: 1px solid rgba(255,255,255,0.1);
            border-left: 1px solid rgba(255,255,255,0.05);
        }

        .page-head { text-align: center; margin-bottom: 28px; }
        .page-head .icon-circle {
            width: 64px; height: 64px; margin: 0 auto 16px;
            background: linear-gradient(135deg, var(--purple), var(--cyan));
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 1.6rem; box-shadow: 0 0 30px rgba(124,58,237,0.4);
        }
        .page-head h2 { font-size: 1.5rem; font-weight: 800; }
        .page-head p  { color: var(--muted); font-size: 0.9rem; margin-top: 6px; }

        .summary-box {
            background: var(--surface2); border-radius: 18px; padding: 20px 22px;
            margin-bottom: 28px;
            box-shadow: var(--shadow-card);
            border: 1px solid rgba(0,210,255,0.15);
        }
        .summary-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; }
        .summary-row:not(:last-child) { border-bottom: 1px solid rgba(255,255,255,0.05); }
        .summary-row .label { color: var(--muted); font-size: 0.88rem; }
        .summary-row .value { font-weight: 600; font-size: 0.95rem; }
        .total-row .value { font-size: 1.4rem; font-weight: 800; color: var(--cyan); }

        .section-label { font-size: 0.82rem; font-weight: 700; color: var(--muted); letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 12px; }

        .methods-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 24px; }
        .method-item {
            background: var(--surface2); border: 2px solid rgba(255,255,255,0.07);
            padding: 18px 12px; border-radius: 16px; cursor: pointer; text-align: center;
            transition: all 0.25s;
            box-shadow: 6px 6px 15px rgba(0,0,0,0.4), -3px -3px 8px rgba(255,255,255,0.04);
        }
        .method-item:hover { border-color: rgba(0,210,255,0.3); transform: translateY(-2px); }
        .method-item.active {
            border-color: var(--cyan);
            background: rgba(0,210,255,0.08);
            box-shadow: 0 0 20px rgba(0,210,255,0.2), 6px 6px 15px rgba(0,0,0,0.4);
        }
        .method-item .m-icon { font-size: 1.6rem; margin-bottom: 8px; }
        .method-item p { margin: 0; font-size: 0.85rem; font-weight: 600; }

        .field-group { margin-bottom: 18px; }
        .field-label { display: block; margin-bottom: 8px; font-size: 0.83rem; font-weight: 600; color: var(--muted); }
        .input-3d {
            width: 100%; padding: 14px 16px; border: none; border-radius: 14px;
            background: #0d1526; color: var(--text); font-family: inherit; font-size: 0.95rem;
            box-shadow: var(--shadow-inset); outline: none; transition: 0.25s;
            border: 1px solid transparent;
        }
        .input-3d:focus { box-shadow: var(--shadow-inset), 0 0 14px rgba(0,210,255,0.3); border-color: rgba(0,210,255,0.4); }
        .input-3d::placeholder { color: var(--muted); }

        .btn-pay {
            width: 100%; padding: 16px; margin-top: 8px; border: none; border-radius: 16px;
            background: linear-gradient(145deg, var(--purple), var(--cyan));
            color: white; font-size: 1.05rem; font-weight: 800; cursor: pointer;
            box-shadow: 6px 6px 18px rgba(0,0,0,0.5), -3px -3px 10px rgba(255,255,255,0.06),
                        0 0 25px rgba(124,58,237,0.35);
            border-top: 1px solid rgba(255,255,255,0.2);
            transition: all 0.2s; font-family: inherit;
            letter-spacing: 0.5px;
        }
        .btn-pay:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn-pay:active { transform: translateY(2px); box-shadow: inset 4px 4px 12px rgba(0,0,0,0.6); border-top: none; }

        .cancel-link { display: block; text-align: center; margin-top: 16px; color: var(--muted); text-decoration: none; font-size: 0.88rem; transition: color 0.2s; }
        .cancel-link:hover { color: var(--text); }

        @media(max-width:480px) { .booking-card { padding: 28px 20px; } .methods-grid { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>
<div class="booking-card">
    <div class="page-head">
        <div class="icon-circle">🔒</div>
        <h2>Secure Payment</h2>
        <p>Complete your room booking below</p>
    </div>

    <div class="summary-box">
        <div class="summary-row">
            <span class="label">Selected Room</span>
            <span class="value" id="room-name">—</span>
        </div>
        <div class="summary-row">
            <span class="label">Payment Status</span>
            <span class="value" style="color:#f59e0b">Awaiting Payment</span>
        </div>
        <div class="summary-row total-row" style="margin-top:8px;padding-top:14px;border-top:1px solid rgba(255,255,255,0.08)">
            <span class="label" style="font-size:1rem;font-weight:700">Total Amount</span>
            <span class="value" id="room-price">৳ 0</span>
        </div>
    </div>

    <div class="section-label">Choose Payment Method</div>
    <div class="methods-grid">
        <div class="method-item active" onclick="setMethod('Mobile Banking', this)">
            <div class="m-icon">📱</div>
            <p>Mobile Banking</p>
            <div style="font-size:0.72rem;color:var(--muted);margin-top:4px">bKash / Nagad</div>
        </div>
        <div class="method-item" onclick="setMethod('Card Payment', this)">
            <div class="m-icon">💳</div>
            <p>Card Payment</p>
            <div style="font-size:0.72rem;color:var(--muted);margin-top:4px">Visa / Mastercard</div>
        </div>
    </div>

    <form id="payForm">
        <div class="field-group">
            <label class="field-label" id="phoneLabel">bKash / Nagad Number</label>
            <input type="text" id="accountNo" class="input-3d" placeholder="01XXXXXXXXX" required>
        </div>
        <div class="field-group">
            <label class="field-label">Transaction ID / PIN</label>
            <input type="password" id="transactionId" class="input-3d" placeholder="Enter PIN or Transaction ID" required>
        </div>
        <button type="submit" class="btn-pay"><i class="fa fa-lock"></i> Confirm &amp; Pay Now</button>
        <a href="user_rooms.html" class="cancel-link">← Cancel and go back</a>
    </form>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const room   = params.get('room')  || 'Not Selected';
    const price  = params.get('price') || '৳ 0';

    document.getElementById('room-name').innerText  = room;
    document.getElementById('room-price').innerText = price;

    function setMethod(type, el) {
        document.querySelectorAll('.method-item').forEach(m => m.classList.remove('active'));
        el.classList.add('active');
        const label = document.getElementById('phoneLabel');
        const input = document.getElementById('accountNo');
        if (type === 'Card Payment') {
            label.innerText = 'Card Number';
            input.placeholder = 'XXXX XXXX XXXX XXXX';
        } else {
            label.innerText = 'bKash / Nagad Number';
            input.placeholder = '01XXXXXXXXX';
        }
    }

    document.getElementById('payForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const method    = document.querySelector('.method-item.active p').innerText;
        const accountNo = document.getElementById('accountNo').value;
        const trxId     = document.getElementById('transactionId').value;
        const fd = new FormData();
        fd.append('action','book_room'); fd.append('room', room);
        fd.append('method', method); fd.append('account_no', accountNo);
        fd.append('transaction_id', trxId); fd.append('total', price);
        try {
            const res  = await fetch('api/bookings.php', { method: 'POST', body: fd });
            const data = await res.json();
            if (data.status === 'success') {
                alert('✅ Payment submitted! Waiting for Admin Approval.');
                window.location.href = 'user_rooms.html';
            } else { alert(data.message || 'Failed to submit booking.'); }
        } catch { alert('Connection error.'); }
    });
</script>
</body>
</html>
