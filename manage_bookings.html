<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Bookings – Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="shared.css">
    <style>
        table { min-width: 900px; }
        .trx-id { font-family: 'Courier New', monospace; color: #facc15; font-size: 0.82rem; }
        .acc-no  { font-weight: 700; color: white; }
    </style>
</head>
<body>
    <button class="hamburger" id="hamburger"><i class="fa fa-bars"></i></button>
    <div class="sidebar-overlay" id="overlay"></div>

    <div class="sidebar" id="sidebar">
        <div class="logo">
            <div class="logo-icon">🏨</div>
            <div class="logo-text">Smart<span>Hostel</span></div>
        </div>
        <nav><ul>
            <li onclick="location.href='admin_dashboard.html'"><i class="fa fa-th-large"></i> Dashboard</li>
            <li onclick="location.href='manage_rooms.html'"><i class="fa fa-bed"></i> Manage Rooms</li>
            <li class="active"><i class="fa fa-clipboard-list"></i> Manage Bookings</li>
            <li class="logout" onclick="location.href='login.html'"><i class="fa fa-sign-out-alt"></i> Logout</li>
        </ul></nav>
    </div>

    <div class="main-content">
        <div class="page-header">
            <h1>📋 Booking Verification</h1>
            <p>Verify transaction IDs and approve or reject student room requests.</p>
        </div>

        <div class="table-wrap">
            <div class="panel-title"><i class="fa fa-list-check"></i> All Booking Requests</div>
            <table>
                <thead>
                    <tr>
                        <th>Student</th>
                        <th>Room</th>
                        <th>Payment Method</th>
                        <th>Account / Card</th>
                        <th>Transaction ID</th>
                        <th>Amount</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="adminBookingList">
                    <tr><td colspan="8" style="text-align:center;color:var(--muted);padding:50px">Loading bookings…</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const ham = document.getElementById('hamburger');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        ham.addEventListener('click', () => { sidebar.classList.toggle('open'); overlay.classList.toggle('open'); });
        overlay.addEventListener('click', () => { sidebar.classList.remove('open'); overlay.classList.remove('open'); });

        async function loadBookings() {
            const tbody = document.getElementById('adminBookingList');
            tbody.innerHTML = '';
            try {
                const res  = await fetch('api/bookings.php?action=get_bookings');
                const data = await res.json();
                if (data.status === 'success' && data.data.length > 0) {
                    data.data.forEach(b => {
                        const statusClass = b.status === 'Pending' ? 'badge-pending' : b.status === 'Approved' ? 'badge-approved' : 'badge-rejected';
                        const icon = b.method && b.method.includes('Card') ? 'fa-credit-card' : 'fa-mobile-alt';
                        const actions = b.status === 'Pending'
                            ? `<button class="btn btn-success btn-sm" onclick="updateStatus(${b.id},'Approved')"><i class="fa fa-check"></i> Approve</button>
                               <button class="btn btn-danger  btn-sm" onclick="updateStatus(${b.id},'Rejected')" style="margin-top:5px"><i class="fa fa-times"></i> Reject</button>`
                            : `<span class="badge ${statusClass}">✓ Done</span>`;
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td><strong>${b.userEmail || 'Unknown'}</strong></td>
                            <td><span class="badge badge-cyan">${b.room}</span></td>
                            <td><i class="fa ${icon}" style="color:var(--cyan)"></i> ${b.method || 'N/A'}</td>
                            <td><span class="acc-no">${b.senderNumber || 'N/A'}</span></td>
                            <td><span class="trx-id">${b.transactionID || 'N/A'}</span></td>
                            <td style="color:var(--cyan);font-weight:700">${b.total}</td>
                            <td><span class="badge ${statusClass}">${b.status}</span></td>
                            <td>${actions}</td>
                        `;
                        tbody.appendChild(tr);
                    });
                } else {
                    tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;color:var(--muted);padding:50px">No bookings submitted yet.</td></tr>`;
                }
            } catch {
                tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;color:var(--red);padding:50px">Error loading bookings.</td></tr>`;
            }
        }

        async function updateStatus(id, newStatus) {
            const fd = new FormData();
            fd.append('action','update_status'); fd.append('id', id); fd.append('status', newStatus);
            try {
                const res  = await fetch('api/bookings.php', { method: 'POST', body: fd });
                const data = await res.json();
                if (data.status === 'success') loadBookings();
                else alert('Error: ' + data.message);
            } catch { alert('Connection error.'); }
        }

        window.onload = loadBookings;
    </script>
</body>
</html>
