<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile – SmartHostel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="shared.css">
    <style>
        .profile-grid { display: grid; grid-template-columns: 280px 1fr; gap: 26px; }
        @media(max-width:768px){ .profile-grid { grid-template-columns: 1fr; } }

        .avatar-card {
            background: var(--surface); border-radius: 24px; padding: 36px 24px;
            text-align: center; border: 1px solid var(--border);
            border-top-color: rgba(255,255,255,0.1);
            box-shadow: var(--shadow-card);
        }
        .avatar-wrap {
            position: relative; width: 130px; height: 130px; margin: 0 auto 20px;
        }
        .avatar-wrap img {
            width: 130px; height: 130px; border-radius: 50%; object-fit: cover;
            border: 3px solid var(--cyan);
            box-shadow: 0 0 24px rgba(0,210,255,0.35);
        }
        .avatar-edit {
            position: absolute; bottom: 4px; right: 4px;
            width: 36px; height: 36px; border-radius: 50%;
            background: linear-gradient(135deg, var(--purple), var(--cyan));
            border: none; cursor: pointer; color: white; font-size: 0.85rem;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 3px 3px 10px rgba(0,0,0,0.5);
            transition: transform 0.2s;
        }
        .avatar-edit:hover { transform: scale(1.1); }
        .avatar-card h3 { font-size: 1.2rem; font-weight: 800; margin-bottom: 4px; }
        .student-id {
            display: inline-block; margin-top: 10px;
            background: rgba(0,210,255,0.1); border: 1px solid rgba(0,210,255,0.25);
            color: var(--cyan); padding: 5px 16px; border-radius: 20px; font-size: 0.82rem; font-weight: 600;
        }
        .info-row {
            display: flex; align-items: center; gap: 10px;
            padding: 12px 0; border-bottom: 1px solid var(--border);
            font-size: 0.88rem; color: var(--muted);
        }
        .info-row:last-child { border-bottom: none; }
        .info-row i { width: 20px; color: var(--cyan); }
        .info-row span { color: var(--text); font-weight: 500; }
    </style>
</head>
<body>
    <button class="hamburger" id="hamburger"><i class="fa fa-bars"></i></button>
    <div class="sidebar-overlay" id="overlay"></div>

    <div class="sidebar" id="sidebar">
        <div class="logo">
            <div class="logo-icon">🏨</div>
            <div class="logo-text">Smart<span>Hostel</span></div>
        </div>
        <nav><ul>
            <li onclick="location.href='user_dashboard.html'"><i class="fa fa-home"></i> Dashboard</li>
            <li onclick="location.href='user_rooms.html'"><i class="fa fa-bed"></i> Book a Room</li>
            <li class="active"><i class="fa fa-user"></i> My Profile</li>
            <li class="logout" onclick="location.href='login.html'"><i class="fa fa-sign-out-alt"></i> Logout</li>
        </ul></nav>
    </div>

    <div class="main-content">
        <div class="page-header">
            <h1>👤 My Profile</h1>
            <p>Manage your personal information and account settings.</p>
        </div>

        <div class="profile-grid">
            <!-- Avatar Card -->
            <div class="avatar-card">
                <div class="avatar-wrap">
                    <img id="display-pic" src="https://ui-avatars.com/api/?name=Student&background=00d2ff&color=fff&size=200" alt="Profile">
                    <label for="file-upload" class="avatar-edit"><i class="fa fa-camera"></i></label>
                    <input id="file-upload" type="file" style="display:none" accept="image/*">
                </div>
                <h3 id="profile-name">Student</h3>
                <div class="student-id">ID: SH-2024-001</div>
                <div style="margin-top:24px;text-align:left">
                    <div class="info-row"><i class="fa fa-user-shield"></i> Role: <span>Student</span></div>
                    <div class="info-row"><i class="fa fa-calendar-check"></i> Joined: <span id="joined-date">—</span></div>
                    <div class="info-row"><i class="fa fa-circle" style="color:var(--green);font-size:0.6rem"></i> Status: <span style="color:var(--green)">Active</span></div>
                </div>
            </div>

            <!-- Edit Form -->
            <div class="card-3d">
                <div class="panel-title"><i class="fa fa-edit"></i> Edit Information</div>
                <form id="updateProfileForm">
                    <div class="field-group">
                        <label class="field-label">Full Name</label>
                        <input type="text" id="pName" class="input-3d" placeholder="Enter your full name">
                    </div>
                    <div class="field-group">
                        <label class="field-label">Email Address</label>
                        <input type="email" id="pEmail" class="input-3d" placeholder="your@email.com">
                    </div>
                    <div class="field-group">
                        <label class="field-label">Phone Number</label>
                        <input type="text" id="pPhone" class="input-3d" placeholder="01XXXXXXXXX">
                    </div>
                    <div class="field-group">
                        <label class="field-label">New Password <span style="color:var(--muted);font-weight:400">(leave blank to keep current)</span></label>
                        <input type="password" id="pPass" class="input-3d" placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <i class="fa fa-save"></i> Save Changes
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const ham = document.getElementById('hamburger');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        ham.addEventListener('click', () => { sidebar.classList.toggle('open'); overlay.classList.toggle('open'); });
        overlay.addEventListener('click', () => { sidebar.classList.remove('open'); overlay.classList.remove('open'); });

        document.getElementById('joined-date').innerText = new Date().toLocaleDateString('en-GB', { year:'numeric', month:'short', day:'numeric' });

        document.getElementById('file-upload').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = () => { document.getElementById('display-pic').src = reader.result; };
            reader.readAsDataURL(e.target.files[0]);
        });

        document.getElementById('updateProfileForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('✅ Profile updated successfully!');
        });

        async function loadProfile() {
            try {
                const fd = new FormData(); fd.append('action','check_session');
                const res  = await fetch('api/auth.php', { method: 'POST', body: fd });
                const data = await res.json();
                if (data.status === 'success') {
                    document.getElementById('profile-name').innerText = data.name || 'Student';
                    document.getElementById('pName').value  = data.name  || '';
                    document.getElementById('pEmail').value = data.email || '';
                }
            } catch { console.error('Error loading profile.'); }
        }
        window.onload = loadProfile;
    </script>
</body>
</html>
