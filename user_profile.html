<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Smart Hostel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0f172a;
            --sidebar-bg: #161e2d;
            --card-bg: rgba(255, 255, 255, 0.05);
            --accent-cyan: #00d2ff;
            --accent-purple: #7e22ce;
            --text-gray: #94a3b8;
            --border-glass: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            min-height: 100vh;
        }

        /* --- Unified Sidebar Style --- */
        .sidebar {
            width: 250px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-glass);
            padding: 30px 20px;
            position: fixed;
            height: 100vh;
            box-sizing: border-box;
            z-index: 100;
        }

        .sidebar h2 {
            color: var(--accent-cyan);
            font-size: 1.4rem;
            letter-spacing: 2px;
            margin-bottom: 50px;
            text-transform: uppercase;
        }

        .sidebar ul { list-style: none; padding: 0; margin: 0; }
        .sidebar ul li {
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--text-gray);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .sidebar ul li:hover, .sidebar ul li.active {
            background: linear-gradient(90deg, rgba(0, 210, 255, 0.1), rgba(126, 34, 206, 0.1));
            color: white;
            border-left: 4px solid var(--accent-cyan);
        }

        .btn-logout { color: #f87171 !important; margin-top: 50px !important; }

        /* --- Main Content --- */
        .main-content {
            margin-left: 250px;
            padding: 40px;
            width: calc(100% - 250px);
            box-sizing: border-box;
        }

        .header h1 { font-size: 2rem; margin: 0; }
        .header p { color: var(--text-gray); margin-top: 5px; }

        .profile-container {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 30px;
            margin-top: 30px;
        }

        .glass-card {
            background: var(--card-bg);
            border: 1px solid var(--border-glass);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .profile-pic-section { text-align: center; }
        .profile-img-wrapper {
            width: 130px; height: 130px; border-radius: 50%;
            margin: 0 auto 20px; border: 3px solid var(--accent-cyan);
            padding: 5px; position: relative;
        }
        .profile-img-wrapper img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .upload-btn {
            background: var(--accent-cyan); border: none; width: 35px; height: 35px;
            border-radius: 50%; position: absolute; bottom: 5px; right: 5px;
            cursor: pointer; color: #0f172a;
        }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--text-gray); font-size: 0.9rem; }
        .form-group input {
            width: 100%; padding: 12px; background: rgba(30, 41, 59, 0.5);
            border: 1px solid var(--border-glass); border-radius: 8px;
            color: white; box-sizing: border-box; outline: none;
        }
        .form-group input:focus { border-color: var(--accent-cyan); }

        .btn-update {
            width: 100%; padding: 14px; border-radius: 8px; border: none;
            background: linear-gradient(90deg, #00d2ff, #7e22ce);
            color: white; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-update:hover { transform: translateY(-2px); opacity: 0.9; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>SMART HOSTEL</h2>
        <ul>
            <li onclick="location.href='user_dashboard.html'"><i class="fa fa-home"></i> Dashboard</li>
            <li onclick="location.href='user_rooms.html'"><i class="fa fa-bed"></i> Book a Room</li>
            <li class="active" onclick="location.href='user_profile.html'"><i class="fa fa-user"></i> My Profile</li>
            <li class="btn-logout" onclick="location.href='index.html'"><i class="fa fa-sign-out-alt"></i> Logout</li>
        </ul>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>My Profile</h1>
            <p>Manage your personal information and account settings.</p>
        </div>

        <div class="profile-container">
            <div class="glass-card profile-pic-section">
                <div class="profile-img-wrapper">
                    <img id="display-pic" src="https://ui-avatars.com/api/?name=Student&background=00d2ff&color=fff" alt="User">
                    <label for="file-upload" class="upload-btn">
                        <i class="fa fa-camera" style="margin-top: 10px; display: block;"></i>
                    </label>
                    <input id="file-upload" type="file" style="display:none;" accept="image/*"/>
                </div>
                <h3>Photo</h3>
                <p style="color: var(--text-gray); font-size: 0.9rem;">Student ID: SH-2024-001</p>
            </div>

            <div class="glass-card">
                <form id="updateProfileForm">
                    <div class="form-group"><label>Full Name</label><input type="text" placeholder="Enter full name"></div>
                    <div class="form-group"><label>Email Address</label><input type="email" placeholder="Enter email"></div>
                    <div class="form-group"><label>Phone Number</label><input type="text" placeholder="Enter phone"></div>
                    <div class="form-group"><label>Update Password</label><input type="password" placeholder="New password"></div>
                    <button type="submit" class="btn-update">Update Profile</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('file-upload').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function() { document.getElementById('display-pic').src = reader.result; }
            reader.readAsDataURL(e.target.files[0]);
        });
    </script>
</body>
</html>
