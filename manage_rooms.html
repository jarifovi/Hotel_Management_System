<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Rooms - Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg-dark: #0f172a; --sidebar-bg: #161e2d; --accent-cyan: #00d2ff; --text-gray: #94a3b8; --border-glass: rgba(255, 255, 255, 0.1); }
        body { background-color: var(--bg-dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; }
        
        .sidebar { width: 250px; background: var(--sidebar-bg); border-right: 1px solid var(--border-glass); padding: 30px 20px; position: fixed; height: 100vh; box-sizing: border-box; }
        .sidebar h2 { color: var(--accent-cyan); font-size: 1.2rem; margin-bottom: 40px; }
        .sidebar ul { list-style: none; padding: 0; }
        .sidebar ul li { padding: 15px; margin-bottom: 10px; border-radius: 12px; color: var(--text-gray); cursor: pointer; display: flex; align-items: center; gap: 12px; }
        .sidebar ul li.active { background: rgba(0, 210, 255, 0.1); color: white; border-left: 4px solid var(--accent-cyan); }

        .main-content { margin-left: 250px; padding: 40px; width: calc(100% - 250px); }
        
        .card { background: rgba(255,255,255,0.05); padding: 25px; border-radius: 20px; border: 1px solid var(--border-glass); margin-bottom: 30px; }
        
        /* Form Styling */
        .form-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid var(--border-glass); background: #1e293b; color: white; box-sizing: border-box; }
        
        .image-input-container { grid-column: span 2; border: 1px dashed var(--border-glass); padding: 15px; border-radius: 10px; margin-top: 10px; }
        .image-input-container label { display: block; margin-bottom: 5px; color: var(--accent-cyan); font-size: 0.9rem; }

        .btn-add { background: linear-gradient(90deg, #7e22ce, #00d2ff); border: none; padding: 15px 30px; color: white; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 15px; transition: 0.3s; }
        .btn-add:hover { opacity: 0.8; transform: translateY(-2px); }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid var(--border-glass); }
        th { color: var(--accent-cyan); font-size: 0.8rem; text-transform: uppercase; }
        .btn-del { background: #ef4444; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; }
        .room-badge { padding: 4px 8px; border-radius: 5px; font-size: 0.75rem; background: rgba(0,210,255,0.1); color: var(--accent-cyan); }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>ADMIN PANEL</h2>
        <ul>
            <li onclick="location.href='admin_dashboard.html'"><i class="fa fa-th-large"></i> Dashboard</li>
            <li class="active" onclick="location.href='manage_rooms.html'"><i class="fa fa-bed"></i> Manage Rooms</li>
            <li onclick="location.href='manage_bookings.html'"><i class="fa fa-clipboard-list"></i> Manage Bookings</li>
            <li onclick="location.href='login.html'"><i class="fa fa-sign-out-alt"></i> Logout</li>
        </ul>
    </div>

    <div class="main-content">
        <h1>Manage Rooms</h1>
        
        <div class="card">
            <h3>Add New Room</h3>
            <div class="form-group">
                <input type="text" id="rName" placeholder="Room No (e.g. 301)">
                <select id="rType">
                    <option value="Single Room">Single Room</option>
                    <option value="Double Room">Double Room</option>
                </select>
                <input type="text" id="rPrice" placeholder="Price (e.g. 5,000)">
                <input type="text" id="rImgLink" placeholder="Image URL (Link)">
            </div>
            
            <div class="image-input-container">
                <label><i class="fa fa-upload"></i> Or Upload from PC:</label>
                <input type="file" id="rImgFile" accept="image/*" onchange="previewImage(this)">
            </div>

            <button class="btn-add" onclick="saveRoom()">Save & Add Room</button>
        </div>

        <div class="card">
            <h3>Current Rooms</h3>
            <table>
                <thead>
                    <tr>
                        <th>Image</th>
                        <th>Room Details</th>
                        <th>Price</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="roomTable"></tbody>
            </table>
        </div>
    </div>

    <script>
        let uploadedImageData = "";

        function previewImage(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    uploadedImageData = e.target.result; // Base64 Data
                };
                reader.readAsDataURL(file);
            }
        }

        function saveRoom() {
            const name = document.getElementById('rName').value;
            const type = document.getElementById('rType').value;
            const price = document.getElementById('rPrice').value;
            const imgLink = document.getElementById('rImgLink').value;

            const finalImg = uploadedImageData || imgLink || 'https://via.placeholder.com/300?text=No+Image';

            if(!name || !price) return alert("Please fill room number and price!");

            let rooms = JSON.parse(localStorage.getItem('allRooms')) || [];
            
            rooms.push({ 
                name: `Room #${name} (${type})`, 
                price: price, 
                image: finalImg 
            });

            localStorage.setItem('allRooms', JSON.stringify(rooms));
            
            // ফর্ম ক্লিয়ার করা
            alert("Room Added Successfully!");
            location.reload();
        }

        function loadRooms() {
            let rooms = JSON.parse(localStorage.getItem('allRooms')) || [];
            const table = document.getElementById('roomTable');
            
            if(rooms.length === 0) {
                table.innerHTML = `<tr><td colspan="4" style="text-align:center; color:gray">No rooms added yet.</td></tr>`;
                return;
            }

            table.innerHTML = rooms.map((r, i) => `
                <tr>
                    <td><img src="${r.image}" width="60" height="40" style="border-radius:5px; object-fit:cover;"></td>
                    <td>
                        <strong>${r.name}</strong>
                    </td>
                    <td>৳ ${r.price}</td>
                    <td><button class="btn-del" onclick="deleteRoom(${i})"><i class="fa fa-trash"></i></button></td>
                </tr>
            `).join('');
        }

        function deleteRoom(i) {
            if(confirm("Are you sure you want to delete this room?")) {
                let rooms = JSON.parse(localStorage.getItem('allRooms')) || [];
                rooms.splice(i, 1);
                localStorage.setItem('allRooms', JSON.stringify(rooms));
                loadRooms();
            }
        }

        window.onload = loadRooms;
    </script>
</body>
</html>
