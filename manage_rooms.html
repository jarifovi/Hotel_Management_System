<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Rooms – Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="shared.css">
    <style>
        .form-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        @media(max-width:600px){ .form-2col { grid-template-columns: 1fr; } }
        .room-img { width: 64px; height: 48px; object-fit: cover; border-radius: 8px; box-shadow: 3px 3px 10px rgba(0,0,0,0.4); }
    </style>
</head>
<body>
    <button class="hamburger" id="hamburger"><i class="fa fa-bars"></i></button>
    <div class="sidebar-overlay" id="overlay"></div>

    <div class="sidebar" id="sidebar">
        <div class="logo">
            <div class="logo-icon">🏨</div>
            <div class="logo-text">Smart<span>Hostel</span></div>
        </div>
        <nav><ul>
            <li onclick="location.href='admin_dashboard.html'"><i class="fa fa-th-large"></i> Dashboard</li>
            <li class="active"><i class="fa fa-bed"></i> Manage Rooms</li>
            <li onclick="location.href='manage_bookings.html'"><i class="fa fa-clipboard-list"></i> Manage Bookings</li>
            <li class="logout" onclick="location.href='login.html'"><i class="fa fa-sign-out-alt"></i> Logout</li>
        </ul></nav>
    </div>

    <div class="main-content">
        <div class="page-header">
            <h1>🛏️ Manage Rooms</h1>
            <p>Add, update or remove hostel rooms from the system.</p>
        </div>

        <div class="card-3d" style="margin-bottom:28px">
            <div class="panel-title"><i class="fa fa-plus-circle"></i> Add New Room</div>
            <div class="form-2col">
                <div class="field-group">
                    <label class="field-label">Room Number</label>
                    <input type="text" id="rName" class="input-3d" placeholder="e.g. 301">
                </div>
                <div class="field-group">
                    <label class="field-label">Room Type</label>
                    <select id="rType" class="input-3d">
                        <option value="Single Room">Single Room</option>
                        <option value="Double Room">Double Room</option>
                        <option value="Triple Room">Triple Room</option>
                        <option value="Deluxe Room">Deluxe Room</option>
                    </select>
                </div>
                <div class="field-group">
                    <label class="field-label">Monthly Price (৳)</label>
                    <input type="text" id="rPrice" class="input-3d" placeholder="e.g. 5000">
                </div>
                <div class="field-group">
                    <label class="field-label">Image URL (optional)</label>
                    <input type="text" id="rImgLink" class="input-3d" placeholder="https://...">
                </div>
            </div>
            <div class="upload-zone" onclick="document.getElementById('rImgFile').click()" style="margin:16px 0">
                <i class="fa fa-cloud-upload-alt" style="font-size:1.5rem;margin-bottom:8px;color:var(--cyan)"></i>
                <div>Click to upload room image from your PC</div>
                <input type="file" id="rImgFile" accept="image/*" onchange="previewImage(this)" style="display:none">
            </div>
            <button class="btn btn-primary" onclick="saveRoom()">
                <i class="fa fa-save"></i> Save &amp; Add Room
            </button>
        </div>

        <div class="table-wrap">
            <div class="panel-title"><i class="fa fa-list"></i> All Rooms</div>
            <table>
                <thead>
                    <tr><th>Image</th><th>Room</th><th>Type</th><th>Price/Month</th><th>Action</th></tr>
                </thead>
                <tbody id="roomTable">
                    <tr><td colspan="5" style="text-align:center;color:var(--muted);padding:40px">Loading rooms…</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const ham = document.getElementById('hamburger');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        ham.addEventListener('click', () => { sidebar.classList.toggle('open'); overlay.classList.toggle('open'); });
        overlay.addEventListener('click', () => { sidebar.classList.remove('open'); overlay.classList.remove('open'); });

        let uploadedImageData = '';
        function previewImage(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = e => { uploadedImageData = e.target.result; };
                reader.readAsDataURL(file);
            }
        }

        async function saveRoom() {
            const name = document.getElementById('rName').value;
            const type = document.getElementById('rType').value;
            const price = document.getElementById('rPrice').value;
            const imgLink = document.getElementById('rImgLink').value;
            const finalImg = uploadedImageData || imgLink || 'https://via.placeholder.com/300?text=No+Image';
            if (!name || !price) return alert('Please fill in Room Number and Price!');
            const fd = new FormData();
            fd.append('action','add_room'); fd.append('name',`Room #${name}`);
            fd.append('type',type); fd.append('price',price); fd.append('image',finalImg);
            try {
                const res = await fetch('api/rooms.php', { method: 'POST', body: fd });
                const data = await res.json();
                if (data.status === 'success') { alert('Room Added!'); location.reload(); }
                else alert(data.message);
            } catch { alert('Connection error.'); }
        }

        async function loadRooms() {
            const tb = document.getElementById('roomTable');
            try {
                const res = await fetch('api/rooms.php?action=get_rooms');
                const data = await res.json();
                if (data.status === 'success' && data.data.length > 0) {
                    tb.innerHTML = data.data.map(r => `
                        <tr>
                            <td><img src="${r.image}" class="room-img" onerror="this.src='https://via.placeholder.com/64x48?text=No+Img'"></td>
                            <td><strong>${r.name}</strong></td>
                            <td><span class="badge badge-cyan">${r.type}</span></td>
                            <td style="color:var(--cyan);font-weight:700">৳ ${r.price}</td>
                            <td><button class="btn btn-danger btn-sm btn-icon" onclick="deleteRoom(${r.id})"><i class="fa fa-trash"></i></button></td>
                        </tr>
                    `).join('');
                } else {
                    tb.innerHTML = `<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:40px">No rooms added yet.</td></tr>`;
                }
            } catch {
                tb.innerHTML = `<tr><td colspan="5" style="text-align:center;color:var(--red);padding:40px">Error loading rooms.</td></tr>`;
            }
        }

        async function deleteRoom(id) {
            if (!confirm('Delete this room?')) return;
            const fd = new FormData(); fd.append('action','delete_room'); fd.append('id',id);
            try {
                const res = await fetch('api/rooms.php', { method: 'POST', body: fd });
                const data = await res.json();
                if (data.status === 'success') loadRooms(); else alert(data.message);
            } catch { alert('Error deleting room.'); }
        }

        window.onload = loadRooms;
    </script>
</body>
</html>
