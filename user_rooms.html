<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book a Room – SmartHostel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="shared.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        .rooms-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 24px; }
        .room-card {
            background: var(--surface); border-radius: 22px; overflow: hidden;
            border: 1px solid var(--border); border-top-color: rgba(255,255,255,0.1);
            box-shadow: var(--shadow-card); transition: all 0.3s ease;
        }
        .room-card:hover { transform: translateY(-8px); box-shadow: var(--shadow-lift); border-color: rgba(0,210,255,0.3); }
        .room-card img { width: 100%; height: 190px; object-fit: cover; background: var(--surface2); display: block; }
        .room-info { padding: 20px 22px; }
        .room-info h4 { font-size: 1.05rem; font-weight: 700; margin-bottom: 6px; }
        .room-type { display: inline-block; font-size: 0.78rem; padding: 3px 10px; border-radius: 20px; margin-bottom: 12px; }
        .price-tag { font-size: 1.5rem; font-weight: 800; color: var(--cyan); margin-bottom: 16px; }
        .price-tag small { font-size: 0.75rem; color: var(--muted); font-weight: 400; }
        .book-btn {
            width: 100%; padding: 12px; border: none; border-radius: 12px;
            background: linear-gradient(145deg, var(--purple), var(--cyan));
            color: white; font-weight: 700; font-size: 0.95rem; cursor: pointer; font-family: inherit;
            box-shadow: var(--shadow-btn); border-top: 1px solid rgba(255,255,255,0.2);
            transition: all 0.2s;
        }
        .book-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .book-btn:active { transform: translateY(1px); }

        .section-divider { margin: 40px 0 24px; display: flex; align-items: center; gap: 14px; }
        .section-divider h3 { font-size: 1.2rem; font-weight: 700; white-space: nowrap; }
        .section-divider::after { content:''; flex:1; height:1px; background:var(--border); }
        .pdf-btn {
            background: linear-gradient(145deg, #7f1d1d, var(--red)); color: white;
            border: none; padding: 9px 18px; border-radius: 10px; cursor: pointer;
            font-weight: 700; font-size: 0.85rem; font-family: inherit;
            box-shadow: var(--shadow-btn); border-top: 1px solid rgba(255,255,255,0.15);
            transition: all 0.2s;
        }
        .pdf-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
    </style>
</head>
<body>
    <button class="hamburger" id="hamburger"><i class="fa fa-bars"></i></button>
    <div class="sidebar-overlay" id="overlay"></div>

    <div class="sidebar" id="sidebar">
        <div class="logo">
            <div class="logo-icon">🏨</div>
            <div class="logo-text">Smart<span>Hostel</span></div>
        </div>
        <nav><ul>
            <li onclick="location.href='user_dashboard.html'"><i class="fa fa-home"></i> Dashboard</li>
            <li class="active"><i class="fa fa-bed"></i> Book a Room</li>
            <li onclick="location.href='user_profile.html'"><i class="fa fa-user"></i> My Profile</li>
            <li class="logout" onclick="location.href='login.html'"><i class="fa fa-sign-out-alt"></i> Logout</li>
        </ul></nav>
    </div>

    <div class="main-content">
        <div class="page-header">
            <h1>🛏️ Available Rooms</h1>
            <p>Choose your preferred room and complete the booking in seconds.</p>
        </div>

        <div class="rooms-grid" id="roomDisplay">
            <p style="color:var(--muted)">Loading available rooms…</p>
        </div>

        <div class="section-divider">
            <h3><i class="fa fa-history" style="color:var(--cyan)"></i> My Booking History</h3>
            <button class="pdf-btn" onclick="exportPDF()"><i class="fa fa-file-pdf"></i> Export PDF</button>
        </div>

        <div class="table-wrap">
            <table id="bookingTable">
                <thead>
                    <tr>
                        <th>Room</th><th>Date</th><th>Amount</th><th>Status</th>
                    </tr>
                </thead>
                <tbody id="bookingList">
                    <tr><td colspan="4" style="text-align:center;color:var(--muted);padding:40px">Loading bookings…</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const ham = document.getElementById('hamburger');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        ham.addEventListener('click', () => { sidebar.classList.toggle('open'); overlay.classList.toggle('open'); });
        overlay.addEventListener('click', () => { sidebar.classList.remove('open'); overlay.classList.remove('open'); });

        async function loadAvailableRooms() {
            const rd = document.getElementById('roomDisplay');
            try {
                const res  = await fetch('api/rooms.php?action=get_rooms');
                const data = await res.json();
                if (data.status === 'success' && data.data.length > 0) {
                    rd.innerHTML = data.data.map(room => `
                        <div class="room-card">
                            <img src="${room.image || 'https://via.placeholder.com/500x300?text=No+Image'}" alt="${room.name}"
                                 onerror="this.src='https://via.placeholder.com/500x300?text=No+Image'">
                            <div class="room-info">
                                <h4>${room.name}</h4>
                                <span class="room-type badge badge-cyan">${room.type}</span>
                                <div class="price-tag">৳ ${room.price} <small>/month</small></div>
                                <button class="book-btn" onclick="requestBooking('${room.name}', '৳ ${room.price}')">
                                    <i class="fa fa-bolt"></i> Book Now
                                </button>
                            </div>
                        </div>
                    `).join('');
                } else {
                    rd.innerHTML = `<p style="color:var(--muted);padding:40px;grid-column:1/-1;text-align:center">
                        <i class="fa fa-inbox" style="font-size:2rem;display:block;margin-bottom:12px;opacity:0.4"></i>
                        No rooms have been added by the Admin yet.</p>`;
                }
            } catch {
                rd.innerHTML = `<p style="color:var(--red);padding:40px;grid-column:1/-1;text-align:center">Error loading rooms.</p>`;
            }
        }

        function requestBooking(roomName, price) {
            window.location.href = `booking.html?room=${encodeURIComponent(roomName)}&price=${encodeURIComponent(price)}`;
        }

        async function loadBookings() {
            const tb = document.getElementById('bookingList');
            try {
                const res  = await fetch('api/bookings.php?action=get_bookings');
                const data = await res.json();
                if (data.status === 'success' && data.data.length > 0) {
                    tb.innerHTML = data.data.map(b => {
                        const sc = b.status === 'Approved' ? 'badge-approved' : b.status === 'Rejected' ? 'badge-rejected' : 'badge-pending';
                        return `<tr>
                            <td><strong>${b.room}</strong></td>
                            <td style="color:var(--muted)">${b.in}</td>
                            <td style="color:var(--cyan);font-weight:700">${b.total}</td>
                            <td><span class="badge ${sc}">${b.status}</span></td>
                        </tr>`;
                    }).join('');
                } else {
                    tb.innerHTML = `<tr><td colspan="4" style="text-align:center;color:var(--muted);padding:40px">No bookings found.</td></tr>`;
                }
            } catch {
                tb.innerHTML = `<tr><td colspan="4" style="text-align:center;color:var(--red);padding:40px">Error loading bookings.</td></tr>`;
            }
        }

        function exportPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text('SmartHostel – My Booking Report', 14, 15);
            doc.autoTable({ html: '#bookingTable', startY: 22, theme: 'grid' });
            doc.save('booking_history.pdf');
        }

        window.onload = () => { loadAvailableRooms(); loadBookings(); };
    </script>
</body>
</html>
